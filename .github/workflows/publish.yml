name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/p/binmanx

    steps:
      - name: Download repo code
        uses: actions/checkout@v4

      - name: Config python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package (Wheel and Tarball)
        run: python -m build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1